name: Publish LDAP Manager

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  version:
    name: Read App Version
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.version.outputs.app-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package.json version
        id: version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "app-version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

  publish:
    name: Build & Push
    needs: version
    uses: VibhuviOiO/github-engineering/.github/workflows/container-publish.yml@main
    with:
      image-name: ldap-manager
      dockerfile: Dockerfile.prod
      platforms: linux/amd64,linux/arm64
      ghcr-enabled: true
      dockerhub-enabled: true
      quay-enabled: true
      tags: |
        type=raw,value=latest
        type=raw,value=${{ needs.version.outputs.app-version }}
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=sha,prefix=
    secrets: inherit
